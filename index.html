<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teen Maker Event</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Teen Maker Hardware Event</h1>
  </header>

  <main>
    <!-- Google Doc content loads here -->
    <div id="content">Loading...</div>
  </main>

  <footer>
    <p>© 2026 Maker Event</p>
  </footer>

  <script>
    fetch('content.html')   // <-- your exported Google Doc file
      .then(res => res.text())
      .then(html => {
        // Extract only the body content (avoids duplicate <html>, <head>, etc.)
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        document.getElementById('content').innerHTML = doc.body.innerHTML;
      })
      .catch(err => {
        document.getElementById('content').innerHTML = "Failed to load content.";
        console.error(err);
      });
  </script>

</body>
</html>
