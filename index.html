<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teen Maker Event</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Teen Maker Hardware Event</h1>
  </header>

  <main>
    <div id="content">Loading...</div>
  </main>

  <footer>
    <p>© 2026 Maker Event</p>
  </footer>

  <script>
    fetch('content.html')
      .then(res => res.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        const containerId = "#content";

        // 1. Scope all <style> rules to #content
        doc.querySelectorAll('style').forEach(style => {
          let scopedCSS = style.innerHTML;

          // Prefix each selector with #content
          scopedCSS = scopedCSS.replace(/(^|\})\s*([^{]+)/g, (match, brace, selector) => {
            // Skip @ rules like @media
            if (selector.includes('@')) return match;
            
            const scopedSelector = selector
              .split(',')
              .map(s => `${containerId} ${s.trim()}`)
              .join(', ');

            return `${brace} ${scopedSelector}`;
          });

          const newStyle = document.createElement('style');
          newStyle.innerHTML = scopedCSS;
          document.head.appendChild(newStyle);
        });

        // 2. Inject content inside container
        document.getElementById('content').innerHTML =
          `<div class="doc-content">${doc.body.innerHTML}</div>`;
      })
      .catch(err => {
        document.getElementById('content').innerHTML = "Failed to load content.";
        console.error(err);
      });
  </script>

</body>
</html>
