<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Berkeley Build Guild</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1><img src="images/hack_club_logo_hand.svg" alt="Hack Club Logo" style="vertical-align: left; height: 40px;">Berkeley Build Guild</h1>
  </header>

  <main>
    <div id="content">Loading...</div>
  </main>

  <footer>
    <p style="text-align: center;">© 2026 Berkeley Build Guild
      <br> Open source on <a href="https://github.com/Coding-Koala222/berkeley-build-guild-website" target="_blank" rel="noopener noreferrer">GitHub</a>
      <br> A program of <a href="https://hackclub.com/" target="_blank" rel="noopener noreferrer">Hack Club</a>
    </p>
  </footer>

  <script>
    fetch(`content.html?t=${Date.now()}`, {
      cache: "no-store"
    })
      .then(res => res.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        const containerId = "#content";

        // 1. Scope all <style> rules to #content
        doc.querySelectorAll('style').forEach(style => {
          let scopedCSS = style.innerHTML;

          // Prefix each selector with #content
          scopedCSS = scopedCSS.replace(/(^|\})\s*([^{]+)/g, (match, brace, selector) => {
            // Skip @ rules like @media
            if (selector.includes('@')) return match;
            
            const scopedSelector = selector
              .split(',')
              .map(s => `${containerId} ${s.trim()}`)
              .join(', ');

            return `${brace} ${scopedSelector}`;
          });

          const newStyle = document.createElement('style');
          newStyle.innerHTML = scopedCSS;
          document.head.appendChild(newStyle);
        });

        // 2. Inject content inside container
        document.getElementById('content').innerHTML =
          `<div class="doc-content">${doc.body.innerHTML}</div>`;
      })
      .catch(err => {
        document.getElementById('content').innerHTML = "Failed to load content.";
        console.error(err);
      });
  </script>

</body>
</html>
