name: Build, Optimize with Classpresso, and Deploy

on:
  workflow_run:
    workflows: [Build Tailwind CSS]
    types:
      - completed

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      # Build your static site
      - name: Build site
        uses: MadaraUchiha/copy-action@0.0.1
        with:
          source: pages/.
          target: dist/
          flags: '-r'

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git commit -m "Copy html files to dist folder" || echo "No changes to commit"
          git push || echo "Nothing to push"

      # Optimize classes in built HTML and CSS
      - name: Optimize HTML with Classpresso
        run: npx classpresso optimize --dir dist

      # Deploy to GitHub Pages branch (replace as appropriate)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
