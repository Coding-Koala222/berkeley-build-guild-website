name: Build, Optimize with Classpresso, and Deploy

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      # Build your static site (may differ for your framework!)
      - name: Build site
        run: npm run build          # Make sure this outputs to dist/ or similar

      # Optimize classes in built HTML and CSS
      - name: Optimize HTML with Classpresso
        run: npx classpresso optimize --dir dist

      # Deploy to GitHub Pages branch (replace as appropriate)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
